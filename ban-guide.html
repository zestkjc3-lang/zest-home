<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>개설반 안내 — 제스트에듀</title>
<meta name="description" content="학교별 개설반 안내. 중학교·고등학교 반 편성 및 레벨테스트 상담. 제스트에듀 032-327-2287." />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --paper:#ffffff;--cream:#faf7f1;
    --ink:#1c1a15;--text:#514c41;
    --muted:#8b8574;
    --line:#ece6d9;--line-2:#ddd5c3;
    --gold:#9c7c3c;--gold-deep:#7c6127;
    --maxw:820px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Pretendard Variable",Pretendard,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);background:#f7f4ec;line-height:1.7;-webkit-font-smoothing:antialiased;letter-spacing:-0.02em}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%;height:auto}

  header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .bar{max-width:var(--maxw);margin:0 auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .back{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:14.5px;color:var(--ink)}
  .back:hover{color:var(--gold-deep)}
  .title{font-size:14.5px;font-weight:800;color:var(--ink)}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:999px;font-weight:700;font-size:14.5px;background:var(--gold);color:#fff;border:0;transition:.15s}
  .btn:hover{background:var(--gold-deep)}
  .btn.ghost{background:#fff;color:var(--ink);border:1.5px solid var(--line-2)}
  .btn.ghost:hover{border-color:var(--ink);background:var(--cream)}

  main{max-width:var(--maxw);margin:0 auto;padding:20px 16px 56px}
  .panel{background:var(--paper);border-radius:20px;overflow:hidden;border:1px solid var(--line);box-shadow:0 18px 48px -28px rgba(28,26,21,.28)}
  .panel img{width:100%;height:auto;display:block;max-width:100%;object-fit:contain}

  .article{margin-top:22px;background:var(--paper);border-radius:20px;border:1px solid var(--line);padding:34px 28px 40px;box-shadow:0 14px 40px -28px rgba(28,26,21,.22);text-align:center}
  .article p{font-size:16.5px;color:#2a271f;margin:0 0 1.05em;line-height:1.85}
  .article .tel{font-size:18px;font-weight:800;color:var(--ink);margin-top:18px}

  .actions{margin-top:24px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .note{margin-top:16px;text-align:center;font-size:13.5px;color:var(--muted)}

  @media(max-width:560px){
    .article{padding:26px 18px 32px}
    .title{display:none}
  }
</style>
</head>
<body>
  <header>
    <div class="bar">
      <a class="back" href="index.html#blog">← 홈으로</a>
      <span class="title">개설반 안내</span>
      <a class="btn" href="tel:0323272287">전화 상담</a>
    </div>
  </header>

  <main>
    <div class="panel">
      <img src="images/ban-guide.png?v=1" alt="학교별 개설반 안내 — 중학교 · 고등학교" width="1024" height="576" />
    </div>

    <article class="article">
      <p>현재 안내된 학교 외에도 문의 및 상담이 가능합니다.</p>

      <p>학교별 시험 범위와 출제 경향에 맞춘<br>
      맞춤형 학습 설계를 진행하니<br>
      편하게 문의 주세요.</p>

      <p class="tel">032-327-2287 제스트에듀</p>
    </article>

    <div class="actions">
      <a class="btn" href="tel:0323272287">상담 및 문의 032-327-2287</a>
      <a class="btn ghost" href="index.html#blog">홈으로 돌아가기</a>
    </div>
    <p class="note">부천 상동역 7번출구 뱅뱅프라자 806, 807호</p>
  </main>
</body>
</html>
